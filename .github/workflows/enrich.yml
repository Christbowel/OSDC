name: OSDC Enrichment

on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max new enrichments per run (blank = no limit)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run reach enrichment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: |
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            python -m src.enrich_reach "${{ github.event.inputs.limit }}"
          else
            python -m src.enrich_reach
          fi

      - name: Commit enrichments
        run: |
          git config user.name "Christbowel"
          git config user.email "96427513+Christbowel@users.noreply.github.com"
          git add data/enrichments/
          if git diff --staged --quiet; then
            echo "No new enrichments"
          else
            COUNT=$(git diff --staged --name-only | grep -c "data/enrichments/reach/" || echo 0)
            git commit -m "feat: reach enrichment +${COUNT} records"
            git push
          fi
