name: OSDC Enrichment

on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max total enrichments per worker (blank = no limit)'
        required: false
        default: ''
      chunk_size:
        description: 'Records per checkpoint commit (default 300)'
        required: false
        default: '300'

permissions:
  contents: write

concurrency:
  group: osdc-write
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    env:
      CHUNK_SIZE: ${{ github.event.inputs.chunk_size || '300' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "Christbowel"
          git config user.email "96427513+Christbowel@users.noreply.github.com"

      - name: Run reach enrichment (chunked)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: |
          set -e
          for chunk in $(seq 1 30); do
            echo "::group::Reach chunk ${chunk}"
            START_COUNT=$(find data/enrichments/reach -name '*.json' 2>/dev/null | wc -l)
            python -m src.enrich_reach "${CHUNK_SIZE}" || true
            END_COUNT=$(find data/enrichments/reach -name '*.json' 2>/dev/null | wc -l)
            NEW=$((END_COUNT - START_COUNT))
            echo "Chunk ${chunk}: ${NEW} new reach records (total ${END_COUNT})"

            git add data/enrichments/reach/
            if git diff --staged --quiet; then
              echo "No new reach data in chunk ${chunk}, stopping"
              echo "::endgroup::"
              break
            fi
            git commit -m "feat: reach enrichment chunk ${chunk} (+${NEW})"
            pushed=false
            for j in 1 2 3 4 5; do
              if git pull --rebase --autostash origin main && git push; then
                pushed=true
                echo "Reach chunk ${chunk} push ok on attempt ${j}"
                break
              fi
              echo "push attempt ${j} failed, retrying in $((j*5))s..."
              sleep $((j*5))
            done
            if [ "$pushed" = "false" ]; then
              echo "::error::Push failed for reach chunk ${chunk}, aborting"
              exit 1
            fi
            echo "::endgroup::"

            if [ -n "${{ github.event.inputs.limit }}" ]; then
              if [ "${END_COUNT}" -ge "${{ github.event.inputs.limit }}" ]; then
                echo "Hit user limit"
                break
              fi
            fi
          done

      - name: Run diff enrichment (chunked)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: |
          set -e
          for chunk in $(seq 1 50); do
            echo "::group::Diff chunk ${chunk}"
            START_COUNT=$(find data/enrichments/diff -name '*.json' 2>/dev/null | wc -l)
            python -m src.enrich_diff "${CHUNK_SIZE}" || true
            END_COUNT=$(find data/enrichments/diff -name '*.json' 2>/dev/null | wc -l)
            NEW=$((END_COUNT - START_COUNT))
            echo "Chunk ${chunk}: ${NEW} new diff records (total ${END_COUNT})"

            git add data/enrichments/diff/
            if git diff --staged --quiet; then
              echo "No new diff data in chunk ${chunk}, stopping"
              echo "::endgroup::"
              break
            fi
            git commit -m "feat: diff enrichment chunk ${chunk} (+${NEW})"
            pushed=false
            for j in 1 2 3 4 5; do
              if git pull --rebase --autostash origin main && git push; then
                pushed=true
                echo "Diff chunk ${chunk} push ok on attempt ${j}"
                break
              fi
              echo "push attempt ${j} failed, retrying in $((j*5))s..."
              sleep $((j*5))
            done
            if [ "$pushed" = "false" ]; then
              echo "::error::Push failed for diff chunk ${chunk}, aborting"
              exit 1
            fi
            echo "::endgroup::"

            if [ -n "${{ github.event.inputs.limit }}" ]; then
              if [ "${END_COUNT}" -ge "${{ github.event.inputs.limit }}" ]; then
                echo "Hit user limit"
                break
              fi
            fi
          done
