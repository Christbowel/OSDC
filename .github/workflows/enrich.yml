name: OSDC Enrichment

on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max new enrichments per worker per run (blank = no limit)'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: osdc-write
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run reach enrichment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: |
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            python -m src.enrich_reach "${{ github.event.inputs.limit }}"
          else
            python -m src.enrich_reach
          fi

      - name: Run diff enrichment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: |
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            python -m src.enrich_diff "${{ github.event.inputs.limit }}"
          else
            python -m src.enrich_diff
          fi

      - name: Commit enrichments
        run: |
          set -e
          git config user.name "Christbowel"
          git config user.email "96427513+Christbowel@users.noreply.github.com"
          git add data/enrichments/
          if git diff --staged --quiet; then
            echo "No new enrichments"
            exit 0
          fi
          REACH=$(git diff --staged --name-only | grep -c "data/enrichments/reach/" || true)
          DIFF=$(git diff --staged --name-only | grep -c "data/enrichments/diff/" || true)
          git commit -m "feat: enrichment +${REACH} reach +${DIFF} diff"
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              echo "push ok on attempt $i"
              exit 0
            fi
            echo "push attempt $i failed, retrying in $((i*5))s..."
            sleep $((i*5))
          done
          echo "push failed after 5 retries"
          exit 1
