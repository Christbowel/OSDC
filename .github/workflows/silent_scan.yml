name: OSDC Silent Scan

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: osdc-write
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 70

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run silent scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: python -m src.silent_scan

      - name: Commit results
        if: always()
        run: |
          set -e
          git config user.name "Christbowel"
          git config user.email "96427513+Christbowel@users.noreply.github.com"
          git add data/silent_state.json data/silent_results.jsonl
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          SUSPECTS=$(python -c "
          import json
          from pathlib import Path
          p = Path('data/silent_state.json')
          if p.exists():
              s = json.loads(p.read_text())
              print(s.get('total_suspects', 0))
          else:
              print(0)
          " 2>/dev/null || echo "0")
          git commit -m "scan: silent patch scan — ${SUSPECTS} total suspects"
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              echo "push ok on attempt $i"
              exit 0
            fi
            echo "push attempt $i failed, retrying in $((i*5))s..."
            sleep $((i*5))
          done
          echo "push failed after 5 retries"
          exit 1
