name: OSDC Silent Scan

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run silent scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: python -m src.silent_scan

      - name: Commit results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/silent_state.json data/silent_results.jsonl
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            SUSPECTS=$(python -c "
          import json
          from pathlib import Path
          p = Path('data/silent_state.json')
          if p.exists():
              s = json.loads(p.read_text())
              print(s.get('total_suspects', 0))
          else:
              print(0)
          " 2>/dev/null || echo "0")
            git commit -m "scan: silent patch scan — ${SUSPECTS} total suspects"
            git push
          fi