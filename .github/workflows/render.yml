name: OSDC Render

on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 15 * * *'
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: osdc-write
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Tu peux le laisser à 1 si tu n'as pas besoin de tout l'historique

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Render
        env:
          PYTHONUNBUFFERED: "1"
        run: python -m src.render_cli

      - name: Commit outputs
        run: |
          set -e
          git config user.name "Christbowel"
          git config user.email "96427513+Christbowel@users.noreply.github.com"
          
          git config --local rebase.autoStash true

          git add -A

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "docs: update README and GitHub Pages"

          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              echo "push ok on attempt $i"
              exit 0
            fi
            echo "push attempt $i failed, retrying in $((i*5))s..."
            sleep $((i*5))
          done
          echo "push failed after 5 retries"
          exit 1
