name: OSDC Render

on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 15 * * *'
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Render
        env:
          PYTHONUNBUFFERED: "1"
        run: python -m src.render_cli

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: update README and GitHub Pages"
            git push
          fi
