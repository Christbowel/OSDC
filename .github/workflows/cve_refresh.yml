name: CVE Refresh

on:
  schedule:
    - cron: '0 10 * * 6'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: osdc-write
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Run CVE refresh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m src.cve_refresh

      - name: Render pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m src.render_cli

      - name: Commit and push
        run: |
          set -e
          git config user.name "Christbowel"
          git config user.email "96427513+Christbowel@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: CVE refresh — $(date -u +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              echo "push ok on attempt $i"
              exit 0
            fi
            echo "push attempt $i failed, retrying in $((i*5))s..."
            sleep $((i*5))
          done
          echo "push failed after 5 retries"
          exit 1
