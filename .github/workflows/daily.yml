name: OSDC Analysis

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 14 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: osdc-write
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: python -m src.main

      - name: Commit data
        if: always()
        run: |
          set -e
          git config user.name "Christbowel"
          git config user.email "96427513+Christbowel@users.noreply.github.com"
          git add data/ patches/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          COMMIT_MSG=$(python -c "
          import json
          from pathlib import Path
          log_path = Path('data/run_log.json')
          if log_path.exists():
              log = json.loads(log_path.read_text())
              date = log['run_at'][:10]
              run = log['run_number']
              analyzed = log['analyzed']
              new_p = log['new_patterns']
              print(f'feat: patch analysis {date} [{run}/3] — {analyzed} advisories, {new_p} new patterns')
          else:
              print('fix: partial run — saving progress')
          " 2>/dev/null || echo "fix: partial run — saving progress")
          git commit -m "$COMMIT_MSG"
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              echo "push ok on attempt $i"
              exit 0
            fi
            echo "push attempt $i failed, retrying in $((i*5))s..."
            sleep $((i*5))
          done
          echo "push failed after 5 retries"
          exit 1
